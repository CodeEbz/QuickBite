# Server
server.port=8080
server.forward-headers-strategy=framework

# PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://dpg-d9ggdfupbkes73cnbptg-a.virginia-postgres.render.com/quickbite_y2l4}
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.username=${DB_USERNAME:quickbite_user}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}
auth.auto-verify-signups=${AUTH_AUTO_VERIFY_SIGNUPS:false}

# Paystack
paystack.secret-key=${PAYSTACK_SECRET_KEY:}
paystack.base-url=${PAYSTACK_BASE_URL:https://api.paystack.co}
paystack.currency=${PAYSTACK_CURRENCY:NGN}

# Uploads
quickbite.upload-dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Mail (OTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}

# Actuator Health Check (cron-job.org keepalive)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.mail.enabled=false
